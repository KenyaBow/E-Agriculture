<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#8f1e2d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FarmPulse">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/static/img/logo.png">
  <link rel="apple-touch-icon" href="/static/img/logo.png">
  <link rel="stylesheet" href="/static/style.css">
  <script defer src="/static/app.js"></script>
  <title>{{ title if title else app_name }}</title>
</head>
<body data-page="{{ page if page else 'home' }}">
  <header class="topbar">
    <a class="brand" href="/">
      <span class="brand-badge">{{ icon('sprout')|safe }}</span>
      <span>{{ app_name }}</span>
    </a>
    <div class="topbar-actions">
      <button class="ghost-btn" id="installBtn" type="button" hidden>Install</button>
      <span class="badge">Portrait PWA</span>
    </div>
  </header>
  <main class="page-wrap">
    {% block content %}{% endblock %}
  </main>
  <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
